name: reactive-lambda CI

# Validates the okta_activation_handler (reactive) Lambda + its Terraform on:
#   - push to feature/* branches that touch this Lambda
#   - PR back to main
#
# Mirror of onboarding-workflow-ci.yml. Same gating principles:
#   ✓ pytest (5 cases covering the FAILURE filter + regressions)
#   ✓ Lambda zip build
#   ✓ Terraform fmt + validate on terraform/aws/
#   ✓ py_compile on handler.py
#
# Apply stays operator-gated.

on:
  push:
    branches:
      - 'feature/reactive-lambda-**'
    paths:
      - 'lambdas/okta_activation_handler/**'
      - 'terraform/aws/**'
      - '.github/workflows/reactive-lambda-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'lambdas/okta_activation_handler/**'
      - 'terraform/aws/**'
      - '.github/workflows/reactive-lambda-ci.yml'

concurrency:
  group: reactive-lambda-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: pytest (okta_activation_handler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lambdas/okta_activation_handler/requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lambdas/okta_activation_handler/requirements-dev.txt

      - name: Run pytest
        run: pytest lambdas/okta_activation_handler/tests -v

  build-zip:
    name: build Lambda zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build handler.zip
        run: bash lambdas/okta_activation_handler/build.sh

      - name: Confirm artifact exists
        run: |
          test -f lambdas/okta_activation_handler/build/handler.zip
          ls -lh lambdas/okta_activation_handler/build/handler.zip

  terraform-validate:
    name: terraform fmt + validate (terraform/aws)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'

      - name: Set up Python 3.12 (for build.sh)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Lambda zip (terraform/aws references it via local_file)
        run: bash lambdas/okta_activation_handler/build.sh

      - name: terraform fmt -check
        working-directory: terraform/aws
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        working-directory: terraform/aws
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform/aws
        run: terraform validate -no-color

  python-syntax:
    name: py_compile (handler.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax-check Lambda handler
        run: python -m py_compile lambdas/okta_activation_handler/handler.py
